name: CI/CD Pipeline

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

env:
  NODE_VERSION: '20'
  DATABASE_URL: 'postgresql://root:rootpassword@postgres:5432/orders_db?schema=public'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: rootpassword
          POSTGRES_DB: orders_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Lint (ESLint)
        run: npm run lint:ci
        env:
          CI: true

      - name: Compilar TypeScript
        run: npm run build

      - name: Aguardar PostgreSQL
        run: |
          until pg_isready -h postgres -p 5432 -U root; do
            echo 'Aguardando banco de dados...'
            sleep 1
          done
        env:
          PGPASSWORD: rootpassword

      - name: Executar migrations Prisma
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Testes Unitários
        run: npm run test -- --passWithNoTests
        env:
          NODE_ENV: test

      - name: Testes E2E
        run: npm run test:e2e -- --passWithNoTests
        env:
          NODE_ENV: test

      - name: Gerar Coverage Report
        run: npm run test:cov
        env:
          NODE_ENV: test
        continue-on-error: true

      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

      - name: Pipeline Concluído
        run: echo "CI/CD Pipeline executado com sucesso"
