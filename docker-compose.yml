services:
  api:
    build:
      context: .
      target: development
    container_name: order_system_api
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://root:rootpassword@db:5432/orders_db?schema=public
    depends_on:
      - db
    command: sh -c "npm install && npx prisma generate && npm run start:dev"

  db:
    image: postgres:15-alpine
    container_name: order_system_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: orders_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: